<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page_title }} — StravaXEng</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:     #fc4c02;
      --orange-dk:  #d93e00;
      --sidebar-bg: #111827;
      --sidebar-w:  240px;
      --topbar-h:   56px;
      --text:       #f9fafb;
      --muted:      #9ca3af;
      --hover:      #1f2937;
      --active:     #374151;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow-y: auto;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid #1f2937;
      text-decoration: none;
    }
    .sidebar-brand svg { flex-shrink: 0; }
    .sidebar-brand span {
      font-size: 1rem;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: .3px;
    }

    .sidebar-nav {
      flex: 1;
      padding: .75rem 0;
    }

    .nav-section {
      padding: .4rem 1rem .2rem;
      font-size: .65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .6rem 1.25rem;
      color: #d1d5db;
      text-decoration: none;
      font-size: .875rem;
      transition: background .15s, color .15s;
      border-radius: 0;
    }
    .nav-link:hover {
      background: var(--hover);
      color: var(--text);
    }
    .nav-link.active {
      background: var(--active);
      color: #fff;
      border-left: 3px solid var(--orange);
      padding-left: calc(1.25rem - 3px);
    }
    .nav-link svg { flex-shrink: 0; opacity: .8; }
    .nav-link.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid #1f2937;
      font-size: .78rem;
      color: var(--muted);
    }
    .sidebar-footer strong { color: #d1d5db; display: block; }

    /* ── Topbar ─────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: var(--topbar-h);
      background: var(--orange);
      display: flex;
      align-items: center;
      padding: 0 1.75rem;
      z-index: 90;
      gap: 1rem;
    }
    .topbar h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .3px;
    }
    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .topbar-badge {
      background: rgba(255,255,255,.2);
      color: #fff;
      font-size: .75rem;
      padding: .25rem .6rem;
      border-radius: 12px;
      font-weight: 600;
    }

    /* ── Page body ──────────────────────────────── */
    .page-body {
      margin-left: var(--sidebar-w);
      margin-top: var(--topbar-h);
      min-height: calc(100vh - var(--topbar-h));
      flex: 1;
      padding: 1.75rem;
      max-width: 1300px;
    }

    /* ── Stat cards ─────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .stat-card .s-label {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: #6b7280;
      margin-bottom: .35rem;
    }
    .stat-card .s-value {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--orange);
      line-height: 1.1;
    }
    .stat-card .s-unit {
      font-size: .78rem;
      color: #6b7280;
      margin-top: .2rem;
    }
    .stat-card .s-note {
      font-size: .68rem;
      color: #9ca3af;
      margin-top: .35rem;
    }

    /* ── Cards / panels ─────────────────────────── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #374151;
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 2px solid #f3f4f6;
    }

    /* ── Chart wrapper ──────────────────────────── */
    .chart-wrap {
      position: relative;
      height: 260px;
    }

    /* ── Badges ─────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 4px;
      font-size: .72rem;
      font-weight: 600;
    }
    .badge-run    { background: #fff4ee; color: #c43a00; }
    .badge-ride   { background: #eff6ff; color: #1d4ed8; }
    .badge-walk   { background: #f0fdf4; color: #166534; }
    .badge-swim   { background: #ecfeff; color: #0e7490; }
    .badge-yoga   { background: #fdf4ff; color: #7e22ce; }
    .badge-hike   { background: #fefce8; color: #92400e; }
    .badge-other  { background: #f9fafb; color: #374151; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-failed  { background: #fee2e2; color: #991b1b; }
    .badge-running { background: #fff7ed; color: #c2410c; }
    .badge-partial { background: #fef9c3; color: #92400e; }

    /* ── Table ──────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .855rem;
    }
    thead { background: #1f2937; color: #f9fafb; }
    th, td { padding: .65rem .9rem; text-align: left; white-space: nowrap; }
    th {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .7px;
      font-weight: 600;
    }
    th a { color: #9ca3af; text-decoration: none; }
    th a:hover { color: #fff; }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody tr:hover { background: #fff4ee; }

    .muted { color: #9ca3af; }

    /* ── Pagination ─────────────────────────────── */
    .pagination {
      display: flex;
      gap: .4rem;
      align-items: center;
      justify-content: center;
      margin-top: 1.25rem;
    }
    .pagination a, .pagination span {
      padding: .35rem .75rem;
      border-radius: 6px;
      font-size: .85rem;
      text-decoration: none;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #374151;
    }
    .pagination .current {
      background: var(--orange);
      color: #fff;
      border-color: var(--orange);
      font-weight: 700;
    }
    .pagination a:hover { background: #f3f4f6; }

    /* ── Filter bar ─────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: .65rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-bar select, .filter-bar input {
      padding: .4rem .7rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .875rem;
      background: #fff;
      color: #111827;
    }
    .filter-bar button, .btn {
      padding: .4rem .9rem;
      border: none;
      border-radius: 6px;
      background: var(--orange);
      color: #fff;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid #d1d5db;
      color: #374151;
    }

    /* ── PR record cards ────────────────────────── */
    .record-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .record-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      border-top: 3px solid var(--orange);
    }
    .record-card .r-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .9px; color: #6b7280; margin-bottom: .3rem; }
    .record-card .r-value { font-size: 1.5rem; font-weight: 700; color: #111827; }
    .record-card .r-sub { font-size: .78rem; color: #6b7280; margin-top: .2rem; }

    /* ── Streak cards ───────────────────────────── */
    .streak-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .streak-card {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
      color: #fff;
    }
    .streak-card .st-num { font-size: 2.5rem; font-weight: 800; color: var(--orange); line-height: 1; }
    .streak-card .st-label { font-size: .78rem; color: #9ca3af; margin-top: .35rem; }

    /* ── Coach insight cards ────────────────────── */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .insight-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      border-left: 4px solid var(--orange);
    }
    .insight-card .ic-header { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--orange); margin-bottom: .5rem; }
    .insight-card p { font-size: .9rem; color: #374151; line-height: 1.55; }

    /* ── Pipeline status ────────────────────────── */
    .status-row { display: flex; gap: .5rem; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #10b981; }
    .dot-red   { background: #ef4444; }
    .dot-yellow{ background: #f59e0b; }
    .dot-gray  { background: #9ca3af; }

    /* ── Utility ────────────────────────────────── */
    .section-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #374151;
      margin-bottom: .75rem;
    }
    .empty-state { text-align: center; padding: 3rem; color: #9ca3af; font-size: .9rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ── Activity links ─────────────────────────────── */
    .activity-link { color: #fc4c02; text-decoration: none; font-weight: 500; }
    .activity-link:hover { text-decoration: underline; }

    /* ── Achievement badges ─────────────────────────── */
    .badge-pr      { background: #fff4ee; color: #c43a00; }
    .badge-kom     { background: #fefce8; color: #92400e; }
    .badge-cr      { background: #d1fae5; color: #065f46; }
    .badge-overall { background: #ede9fe; color: #5b21b6; }
  </style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <a href="{% url 'dashboard' %}" class="sidebar-brand">
    <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
      <path d="M26 52L38 12l10 24 6-12" stroke="#fc4c02" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>StravaXEng</span>
  </a>

  <nav class="sidebar-nav">

    <a href="{% url 'dashboard' %}" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>

    <a href="{% url 'activities' %}" class="nav-link {% if active_page == 'activities' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/>
        <line x1="9" y1="16" x2="13" y2="16"/>

      Activities
    </a>

    <a href="{% url 'analytics' %}" class="nav-link {% if active_page == 'analytics' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Analytics
    </a>

    <div class="nav-section" style="margin-top:.5rem;">Insights</div>

    <a href="{% url 'records' %}" class="nav-link {% if active_page == 'records' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      Records &amp; Streaks
    </a>

    <a href="{% url 'coach' %}" class="nav-link {% if active_page == 'coach' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/>
      </svg>
      AI Coach Notes
    </a>

    <div class="nav-section" style="margin-top:.5rem;">System</div>

    <a href="{% url 'pipeline' %}" class="nav-link {% if active_page == 'pipeline' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
      Pipeline Health
    </a>

    <a href="{% url 'settings' %}" class="nav-link {% if active_page == 'settings' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83
                 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33
                 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4

                 a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09
                 a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06
                 a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06
                 A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09
                 a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <div class="sidebar-footer">
    <strong>Sean Mukariri</strong>
    Sandton, South Africa
  </div>
</aside>

<!-- ── Topbar ────────────────────────────────────────────────────────────── -->
<header class="topbar">
  <h1>{{ page_title }}</h1>
  <div class="topbar-right">
    <span class="topbar-badge">
      <svg width="13" height="13" fill="none" stroke="#fff" stroke-width="2.5"
           viewBox="0 0 24 24" style="vertical-align:middle;margin-right:.3rem;">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      Sandton
    </span>
  </div>
</header>

<!-- ── Content ───────────────────────────────────────────────────────────── -->
<main class="page-body">
  {% block content %}{% endblock %}
</main>

</body>
</html>
